<svg viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="vex-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07121a"/>
      <stop offset="100%" stop-color="#0a1622"/>
    </linearGradient>
    <radialGradient id="vex-glow" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="220" fill="url(#vex-bg)"/>
  <rect width="600" height="220" fill="url(#vex-glow)"/>

  <!-- grid -->
  <g stroke="#ffffff" stroke-opacity="0.035" stroke-width="1">
    <line x1="0" y1="44" x2="600" y2="44"/><line x1="0" y1="88" x2="600" y2="88"/>
    <line x1="0" y1="132" x2="600" y2="132"/><line x1="0" y1="176" x2="600" y2="176"/>
    <line x1="120" y1="0" x2="120" y2="220"/><line x1="240" y1="0" x2="240" y2="220"/>
    <line x1="360" y1="0" x2="360" y2="220"/><line x1="480" y1="0" x2="480" y2="220"/>
  </g>

  <!-- title -->
  <text x="40" y="42" font-family="monospace" font-size="9" fill="#22d3ee" fill-opacity="0.6">vexobj / object storage · S3</text>

  <!-- Stacked buckets (left) -->
  <g transform="translate(52, 66)">
    <ellipse cx="44" cy="10" rx="44" ry="12" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.55"/>
    <rect x="0" y="10" width="88" height="26" fill="#22d3ee" fill-opacity="0.05"/>
    <ellipse cx="44" cy="36" rx="44" ry="12" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.4"/>
    <rect x="0" y="36" width="88" height="26" fill="#22d3ee" fill-opacity="0.05"/>
    <ellipse cx="44" cy="62" rx="44" ry="12" fill="#22d3ee" fill-opacity="0.08" stroke="#22d3ee" stroke-width="1.2" stroke-opacity="0.4"/>
    <ellipse cx="44" cy="10" rx="44" ry="12" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-opacity="0.3"/>
    <text x="26" y="16" font-family="monospace" font-size="8" fill="#67e8f9" fill-opacity="0.75">buckets</text>
  </g>
  <text x="60" y="158" font-family="monospace" font-size="7" fill="#22d3ee" fill-opacity="0.5">SQLite · dedup · WORM</text>

  <!-- Single binary chip (center) -->
  <g transform="translate(258, 78)">
    <rect x="0" y="0" width="86" height="64" rx="7" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1.4" stroke-opacity="0.6"/>
    <text x="16" y="26" font-family="monospace" font-size="11" fill="#c4b5fd" fill-opacity="0.95">~14 MB</text>
    <text x="12" y="42" font-family="monospace" font-size="8" fill="#a78bfa" fill-opacity="0.7">Rust binary</text>
    <text x="12" y="55" font-family="monospace" font-size="7" fill="#a78bfa" fill-opacity="0.5">SigV4 · axum</text>
    <!-- pins -->
    <g stroke="#8b5cf6" stroke-opacity="0.5" stroke-width="2">
      <line x1="18" y1="64" x2="18" y2="71"/><line x1="43" y1="64" x2="43" y2="71"/><line x1="68" y1="64" x2="68" y2="71"/>
      <line x1="18" y1="0" x2="18" y2="-7"/><line x1="43" y1="0" x2="43" y2="-7"/><line x1="68" y1="0" x2="68" y2="-7"/>
    </g>
  </g>

  <!-- Image transform pipeline (right-top) -->
  <g transform="translate(400, 60)">
    <rect x="0" y="0" width="150" height="40" rx="6" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="1" stroke-opacity="0.45"/>
    <text x="10" y="17" font-family="monospace" font-size="8" fill="#6ee7b7" fill-opacity="0.85">?w=300&amp;format=webp</text>
    <text x="10" y="31" font-family="monospace" font-size="7" fill="#34d399" fill-opacity="0.6">AVIF · WebP · resize</text>
  </g>

  <!-- Encryption / lock (right-bottom) -->
  <g transform="translate(400, 116)">
    <rect x="0" y="0" width="72" height="40" rx="6" fill="#22d3ee" fill-opacity="0.06" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.45"/>
    <rect x="12" y="16" width="18" height="14" rx="2" fill="none" stroke="#67e8f9" stroke-width="1.2" stroke-opacity="0.8"/>
    <path d="M15 16 v-4 a6 6 0 0 1 12 0 v4" fill="none" stroke="#67e8f9" stroke-width="1.2" stroke-opacity="0.7"/>
    <text x="36" y="21" font-family="monospace" font-size="7" fill="#67e8f9" fill-opacity="0.75">AES-256</text>
    <text x="36" y="31" font-family="monospace" font-size="7" fill="#67e8f9" fill-opacity="0.5">SSE</text>
  </g>

  <!-- Replication (right) -->
  <g transform="translate(486, 116)">
    <rect x="0" y="0" width="64" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.06" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
    <path d="M12 14 h34 M12 26 h34" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.6"/>
    <polygon points="46,10 52,14 46,18" fill="#a78bfa" fill-opacity="0.7"/>
    <polygon points="12,22 6,26 12,30" fill="#a78bfa" fill-opacity="0.7"/>
    <text x="10" y="9" font-family="monospace" font-size="6.5" fill="#c4b5fd" fill-opacity="0.6">replica</text>
  </g>

  <!-- flow arrows -->
  <line x1="140" y1="98" x2="252" y2="104" stroke="#22d3ee" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="346" y1="98" x2="398" y2="84" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="5,3"/>
  <line x1="346" y1="120" x2="398" y2="130" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="5,3"/>

  <text x="212" y="210" font-family="monospace" font-size="8" fill="#22d3ee" fill-opacity="0.35">Rust · S3-compatible · media processing · self-hosted</text>
</svg>
